name: Monitor de Editais Embrapa

on:
  schedule:
    - cron: '0 */6 * * *' # Roda a cada 6 horas
  workflow_dispatch: # Permite rodar manualmente pelo botão "Run workflow"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar código do repositório
        uses: actions/checkout@v4 # Atualizado para v4 (resolve o warning)

      - name: Configurar Python
        uses: actions/setup-python@v5 # Atualizado para v5 (resolve o warning)
        with:
          python-version: '3.10'

      - name: Instalar bibliotecas
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Rodar o monitor
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }} # IMPORTANTE: Adicionado para o e-mail funcionar
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }} # IMPORTANTE: Adicionado para o e-mail funcionar
        run: python monitor.py

      - name: Salvar histórico atualizado
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add historico_editais.csv
          git commit -m "Atualizando histórico de editais [skip ci]" || echo "Sem novidades"
          git push
